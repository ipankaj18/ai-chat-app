version: '3.9'
services:
  backend:
    build:
      context: ./src
    ports:
      - "8000:8000"
    environment:
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8000
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}

      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
    volumes:
      - ./src:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - redis

  ui:
    build:
      context: ./ui
    ports:
      - "3000:3000"
    environment:
      - VITE_BACKEND_HOST=backend
    volumes:
      - ./ui:/app
      - /app/node_modules

    command: npm run dev -- --host 0.0.0.0 --port 3000
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    restart: unless-stopped
    volumes:
      - redis-data:/data

volumes:
  redis-data: